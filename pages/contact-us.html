<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>YJ Digital</title>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="navbar-title-and-logo">
                <img src="../images/LOGO.png" alt="" class="logo">
            </div>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../about.html">About Us</a></li>
                <li><a href="contact-us">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <img src="../images/HERO.jpg" alt="YJ Digital logo">
            <h2>We Build Modern, Responsive Websites</h2>
            <p class="hero-subtext">Helping businesses turn ideas into functional online experiences</p>
            <button class="hero-cta"
                onclick="document.querySelector('.services').scrollIntoView({behavior:'smooth'})">Get Started</button>
        </section>

        <section class="contact-us contact-us-2" id="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-social">
                <!-- GitHub (Johannes) -->

                    class="social-link" aria-label="Johannes' GitHub">

                    <span class="social-label">GitHub</span>
                </a>
                <!-- Email Johannes -->
                <a href="mailto:johannesvihavainen@outlook.com" class="social-link" aria-label="Email Johannes">
                    <i class="fas fa-envelope"></i>
                    <span class="social-label">Johannes</span>
                </a>
                <!-- Email Yalda -->
                <a href="mailto:yaldaaghasi.y.i@gmail.com" class="social-link" aria-label="Email Yalda">
